<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <rect width="600" height="800" fill="#ffffff"/>
  <rect x="0" y="0" width="600" height="120" fill="#0f2a4a"/>
  <text x="40" y="55" fill="#ffffff" font-family="sans-serif" font-size="26" font-weight="900">(주) HABITUS KOREA</text>
  <text x="40" y="90" fill="#4b8bf4" font-family="sans-serif" font-size="16" letter-spacing="2">상상을 현실로</text>
  <text x="40" y="190" fill="#0f2a4a" font-family="sans-serif" font-size="38" font-weight="900">견 적 서</text>
  <line x1="40" y1="210" x2="560" y2="210" stroke="#1c5fc4" stroke-width="3"/>
  <text x="40" y="260" fill="#5b6573" font-family="sans-serif" font-size="18">수신 :</text>
  <text x="40" y="300" fill="#5b6573" font-family="sans-serif" font-size="18">견적일 :</text>
  <text x="40" y="340" fill="#5b6573" font-family="sans-serif" font-size="18">유효기간 :</text>
  <rect x="40" y="380" width="520" height="50" fill="#f4f7fb" stroke="#e2e8f0"/>
  <text x="55" y="412" fill="#0f2a4a" font-family="sans-serif" font-size="16" font-weight="700">품목</text>
  <text x="330" y="412" fill="#0f2a4a" font-family="sans-serif" font-size="16" font-weight="700">수량</text>
  <text x="430" y="412" fill="#0f2a4a" font-family="sans-serif" font-size="16" font-weight="700">금액</text>
  <line x1="40" y1="480" x2="560" y2="480" stroke="#e2e8f0"/>
  <line x1="40" y1="530" x2="560" y2="530" stroke="#e2e8f0"/>
  <line x1="40" y1="580" x2="560" y2="580" stroke="#e2e8f0"/>
  <rect x="40" y="630" width="520" height="50" fill="#0f2a4a"/>
  <text x="55" y="662" fill="#ffffff" font-family="sans-serif" font-size="16" font-weight="700">합계 금액</text>
  <text x="40" y="740" fill="#9aa5b1" font-family="sans-serif" font-size="14">※ 본 문서는 견적서 양식 예시입니다. 실제 견적서로 교체하여 사용하세요.</text>
</svg>
