<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>현장 사진 업로드 · E-CASTING VOTE 관리자</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="admin-body">
  <header class="site-header">
    <div class="container header-inner">
      <a href="index.html" class="brand">
        <img src="assets/images/logo.png" alt="(주) HABITUS KOREA" class="brand-logo" />
      </a>
      <nav class="nav">
        <ul class="nav-list">
          <li><a href="index.html">← 홈페이지로</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main class="section">
    <div class="container admin-narrow">
      <div class="section-head" style="text-align:left;margin-bottom:32px;">
        <span class="section-tag">ADMIN</span>
        <h2 class="section-title">현장 사진 업로드</h2>
        <p class="section-lead">사진을 올리면 현장 갤러리에 자동으로 추가되어 모든 방문자에게 표시됩니다.</p>
      </div>

      <!-- 1) GitHub 토큰 -->
      <div class="admin-card">
        <h3>1. 접속 인증 (GitHub 토큰)</h3>
        <p class="admin-help">
          사진을 올리려면 GitHub 액세스 토큰이 필요합니다. 토큰은 이 브라우저에만 저장되며 외부로 전송되지 않습니다.
          <a href="https://github.com/settings/tokens?type=beta" target="_blank" rel="noopener">토큰 발급받기 ↗</a>
        </p>
        <div class="admin-field">
          <input type="password" id="token" placeholder="github_pat_... 또는 ghp_..." autocomplete="off" />
          <label class="admin-check"><input type="checkbox" id="remember" checked /> 이 브라우저에 저장</label>
        </div>
      </div>

      <!-- 2) 사진 선택 -->
      <div class="admin-card">
        <h3>2. 사진 선택</h3>
        <label class="upload-drop" id="drop">
          <input type="file" id="files" accept="image/*" multiple hidden />
          <span class="upload-icon">🖼️</span>
          <span class="upload-text" id="dropText">사진을 끌어다 놓거나 클릭하여 선택 (여러 장 가능)</span>
          <span class="upload-hint">JPG · PNG · GIF · WEBP (장당 최대 10MB)</span>
        </label>
        <div id="preview" class="admin-preview"></div>
      </div>

      <!-- 3) 업로드 -->
      <div class="admin-card">
        <h3>3. 업로드</h3>
        <p class="form-hint" id="status" role="alert"></p>
        <button class="btn btn-primary btn-block" id="uploadBtn">갤러리에 올리기</button>
      </div>

      <!-- 현재 갤러리 -->
      <div class="admin-card">
        <h3>현재 갤러리 사진 <button class="btn btn-sm btn-outline" id="refreshBtn" type="button">새로고침</button></h3>
        <div id="currentList" class="admin-current">불러오는 중…</div>
      </div>

      <!-- 투표 영상 관리 -->
      <div class="admin-card">
        <h3>투표 영상 관리 (유튜브)</h3>
        <p class="admin-help">유튜브 영상 주소를 붙여넣고 추가하면 홈페이지 "투표 영상"에 표시됩니다.</p>
        <div class="admin-field">
          <input type="text" id="videoUrl" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off" />
          <input type="text" id="videoTitleInput" placeholder="영상 제목 (예: 전자투표 안내 영상)" autocomplete="off" />
        </div>
        <p class="form-hint" id="videoStatus" role="alert"></p>
        <button class="btn btn-primary btn-block" id="videoAddBtn" type="button">영상 추가</button>
        <div id="videoCurrentList" class="admin-current" style="margin-top:18px;">불러오는 중…</div>
      </div>
    </div>
  </main>

  <script src="js/admin.js"></script>
</body>
</html>
